# LLM Pricing Configuration
# Prices per 1M tokens (USD)
# Structure: provider / [sub-provider] / model
# Each provider has a _source URL for refreshing pricing data
#
# =============================================================================
# HOW TO UPDATE PRICING (for future Claude sessions)
# =============================================================================
#
# 1. For each provider, fetch the _source URL using browser automation or WebFetch
# 2. Extract model names and pricing (input/output per 1M tokens)
# 3. Update the YAML entries, using tags to indicate model status:
#    - [production] - stable, recommended for production use
#    - [preview] - available but may change or be discontinued
#    - [deprecated] - scheduled for removal, keep for backwards compatibility
#    - [legacy] - older models still available but superseded
# 4. Update _last_updated with today's date
# 5. Commit with message: "chore: update LLM pricing from official sources"
#
# Model name format follows LiteLLM conventions:
#   - 2-part: provider/model (e.g., cerebras/gpt-oss-120b)
#   - 3-part: provider/sub-provider/model (e.g., groq/openai/gpt-oss-20b)
#
# =============================================================================

_last_updated: "2026-06-29"

