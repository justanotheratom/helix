# =============================================================================
# OpenRouter - special case: cost is tracked authoritatively from API usage,
# NOT from this static table.
# =============================================================================
#
# OpenRouter routes each request to one of several upstream providers (chosen
# per-request by prompt size, parameters, latency, with fallbacks). The actual
# price charged therefore varies request-to-request.
#
# OpenRouter:
#   - does NOT mark up upstream prices (catalog price = upstream price).
#   - charges a 5.5% platform fee on Pay-as-you-go credit purchases (NOT
#     per-request; applied when you top up credits).
#   - returns `usage.cost` in the response (in USD) when the request includes
#     `extra_body={"usage": {"include": True}}` - this number reflects the
#     actual upstream that served the request.
#
# Our cost-tracking pipeline (`tracking.calculate_cost_from_usage`) prefers
# `usage.cost` whenever it's present and > 0, falling back to this static
# table. So entries below are reference values for catalog prices but are
# NOT load-bearing for accurate cost reporting on OpenRouter.
openrouter:
  _source: https://openrouter.ai/api/v1/models
  google:
    gemma-4-26b-a4b-it:
      input: 0.06
      output: 0.33
    gemma-4-31b-it:
      input: 0.12
      output: 0.35
    gemini-3.1-flash-lite:
      input: 0.25
      output: 1.50
    gemini-3.1-pro-preview:
      input: 2.00
      output: 12.00
    gemini-3-pro-preview:
      input: 2.00
      output: 12.00
  openai:
    gpt-oss-120b:
      input: 0.03
      output: 0.15
    gpt-oss-20b:
      input: 0.029
      output: 0.14
  x-ai:
    grok-4.3:
