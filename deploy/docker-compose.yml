# Helix unified stack — one project, one host port (127.0.0.1:7000).
# Bring up with: docker compose -p <repo_id>-helix -f deploy/docker-compose.yml up -d
# Or, from a consumer worktree containing .helix.toml: `helix up`
# `helix up` wraps that, plus the snapshot-build dance for baked images.

# project name comes from `helix up` (-p <repo_id>-helix); do not hardcode.

x-langfuse-shared-env: &langfuse-shared-env
    DATABASE_URL: postgresql://postgres:${LANGFUSE_POSTGRES_PASSWORD}@langfuse-postgres:5432/postgres
    SALT: ${LANGFUSE_SALT}
    ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
    TELEMETRY_ENABLED: "false"
    LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
    CLICKHOUSE_URL: http://langfuse-clickhouse:8123
    CLICKHOUSE_USER: clickhouse
    CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
    CLICKHOUSE_CLUSTER_ENABLED: "false"
    LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
    LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
    LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER}
    LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD}
    LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
    LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
    LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
    LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
    LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
    LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER}
    LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD}
    LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
    LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
    # Browser-facing URL for media — must be reachable from the user's browser.
    # Langfuse hands out pre-signed S3 URLs using this host. With the
    # two-port fallback the easiest reachable host is minio's mapped port.
    LANGFUSE_S3_MEDIA_UPLOAD_EXTERNAL_ENDPOINT: http://127.0.0.1:${LANGFUSE_MINIO_PORT:-9090}
    LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"
    REDIS_HOST: langfuse-redis
    REDIS_PORT: 6379
    REDIS_AUTH: ${LANGFUSE_REDIS_PASSWORD}
    REDIS_TLS_ENABLED: "false"

services:

    # ----- Front door ---------------------------------------------------------
    caddy:
        image: caddy:2
        restart: unless-stopped
        ports:
            - "127.0.0.1:${HELIX_HOST_PORT:-7000}:7000"
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            - helix-api
            - helix-ui
            - langfuse-web

    # ----- Helix services -----------------------------------------------------
    helix-api:
        build:
            context: ../.helix-build
            dockerfile: api/Dockerfile
        restart: unless-stopped
        environment:
            HELIX_DATABASE_URL: postgresql+psycopg://helix:${HELIX_POSTGRES_PASSWORD}@helix-postgres:5432/helix
            HELIX_REDIS_URL: redis://:${HELIX_REDIS_PASSWORD}@helix-redis:6379/0
            HELIX_BLOB_ENDPOINT: http://helix-minio:9000
            HELIX_BLOB_ACCESS_KEY: ${HELIX_MINIO_ROOT_USER}
            HELIX_BLOB_SECRET_KEY: ${HELIX_MINIO_ROOT_PASSWORD}
            HELIX_BLOB_BUCKET: helix
            HELIX_PUBLIC_BASE_URL: http://127.0.0.1:${HELIX_HOST_PORT:-7000}
            HELIX_LANGFUSE_PUBLIC_ORIGIN: http://127.0.0.1:${LANGFUSE_PORT:-3010}
            LANGFUSE_INTERNAL_BASE_URL: http://langfuse-web:3000
            LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL}
            LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD}
            LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID}
            # Project keys let helix-api READ traces from Langfuse on the
            # internal network (basic auth, public:secret) for the inline viewer.
            LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY}
            LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY}
        depends_on:
            helix-postgres: { condition: service_healthy }
            helix-minio:    { condition: service_healthy }
            helix-redis:    { condition: service_healthy }

    helix-worker:
        build:
            context: ../.helix-build
            dockerfile: worker/Dockerfile
        restart: unless-stopped
        # Required for overlayfs mount; cp -R fallback used if not granted.
        cap_add:
            - SYS_ADMIN
        security_opt:
            - apparmor:unconfined
        volumes:
            - helix_snapshot_cache:/var/lib/helix/snapshots
            - helix_oob_cache:/var/lib/helix/oob
            - helix_venv_cache:/var/lib/helix/venvs
        environment:
            HELIX_DATABASE_URL: postgresql+psycopg://helix:${HELIX_POSTGRES_PASSWORD}@helix-postgres:5432/helix
            HELIX_REDIS_URL: redis://:${HELIX_REDIS_PASSWORD}@helix-redis:6379/0
            HELIX_BLOB_ENDPOINT: http://helix-minio:9000
            HELIX_BLOB_ACCESS_KEY: ${HELIX_MINIO_ROOT_USER}
            HELIX_BLOB_SECRET_KEY: ${HELIX_MINIO_ROOT_PASSWORD}
            HELIX_BLOB_BUCKET: helix
            # LLM provider secrets flow into the worker subprocess env.
            OPENAI_API_KEY: ${OPENAI_API_KEY:-}
            GEMINI_API_KEY: ${GEMINI_API_KEY:-}
            ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
            OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
            CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
            GROQ_API_KEY: ${GROQ_API_KEY:-}
            TOGETHERAI_API_KEY: ${TOGETHERAI_API_KEY:-}
            HF_TOKEN: ${HF_TOKEN:-}
            # Langfuse → traces published to the internal hostname.
            LANGFUSE_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY}
            LANGFUSE_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY}
            LANGFUSE_BASE_URL: http://langfuse-web:3000
            LANGFUSE_SAMPLE_RATE: ${LANGFUSE_SAMPLE_RATE}
        depends_on:
            helix-postgres: { condition: service_healthy }
            helix-minio:    { condition: service_healthy }
            helix-redis:    { condition: service_healthy }
        deploy:
            replicas: ${HELIX_WORKER_REPLICAS:-1}

    helix-ui:
        build:
            context: ../ui
            dockerfile: Dockerfile
        restart: unless-stopped
        environment:
            # SPA hits the same origin; baked URL only matters in SSR.
            HELIX_API_INTERNAL: http://helix-api:8000

    helix-postgres:
        image: postgres:17
        restart: unless-stopped
        environment:
            POSTGRES_USER: helix
            POSTGRES_PASSWORD: ${HELIX_POSTGRES_PASSWORD}
            POSTGRES_DB: helix
            TZ: UTC
            PGTZ: UTC
        volumes:
            - helix_postgres_data:/var/lib/postgresql/data
            - ../api/db/migrations:/docker-entrypoint-initdb.d:ro
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U helix -d helix"]
            interval: 3s
            timeout: 3s
            retries: 20

    helix-minio:
        image: cgr.dev/chainguard/minio
        restart: unless-stopped
        entrypoint: sh
        command:
            - -c
            - 'mkdir -p /data/helix && minio server --address ":9000" --console-address ":9001" /data'
        environment:
            MINIO_ROOT_USER: ${HELIX_MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${HELIX_MINIO_ROOT_PASSWORD}
            # Pre-configure the `local` alias for `mc ready local` so the
            # healthcheck doesn't rely on an entrypoint-provided default
            # alias (which the chainguard server image doesn't ship).
            MC_HOST_local: http://${HELIX_MINIO_ROOT_USER}:${HELIX_MINIO_ROOT_PASSWORD}@localhost:9000
        volumes:
            - helix_minio_data:/data
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            interval: 2s
            timeout: 5s
            retries: 10

    helix-redis:
        image: redis:7
        restart: unless-stopped
        command: >
            --requirepass ${HELIX_REDIS_PASSWORD}
            --maxmemory-policy allkeys-lru
        volumes:
            - helix_redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "-a", "${HELIX_REDIS_PASSWORD}", "ping"]
            interval: 3s
            timeout: 5s
            retries: 10

    # ----- Langfuse sub-stack -------------------------------------------------
    langfuse-web:
        image: docker.io/langfuse/langfuse:3
        restart: unless-stopped
        # Internal-only: helix-api reads traces from langfuse-web on the
        # docker network and the Helix UI renders them at /jobs/{id}/traces.
        # No host-port binding — Langfuse is never directly exposed.
        depends_on: &langfuse-deps
            langfuse-postgres:   { condition: service_healthy }
            langfuse-minio:      { condition: service_healthy }
            langfuse-redis:      { condition: service_healthy }
            langfuse-clickhouse: { condition: service_healthy }
        environment:
            <<: *langfuse-shared-env
            NEXTAUTH_URL: http://127.0.0.1:${LANGFUSE_PORT:-3010}
            NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
            AUTH_TRUST_HOST: "true"
            LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID}
            LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME}
            LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID}
            LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME}
            LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY}
            LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY}
            LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL}
            LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME}
            LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD}
        healthcheck:
            test:
                - "CMD-SHELL"
                - "node -e \"fetch('http://127.0.0.1:3000/api/public/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
            interval: 5s
            timeout: 5s
            retries: 30
            start_period: 20s

    langfuse-worker:
        image: docker.io/langfuse/langfuse-worker:3
        restart: unless-stopped
        depends_on: *langfuse-deps
        environment: *langfuse-shared-env

    langfuse-postgres:
        image: postgres:17
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD}
            POSTGRES_DB: postgres
            TZ: UTC
            PGTZ: UTC
        volumes:
            - langfuse_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 3s
            timeout: 3s
            retries: 20

    langfuse-clickhouse:
        image: clickhouse/clickhouse-server
        restart: unless-stopped
        user: "101:101"
        environment:
            CLICKHOUSE_DB: default
            CLICKHOUSE_USER: clickhouse
            CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
        volumes:
            - langfuse_clickhouse_data:/var/lib/clickhouse
            - langfuse_clickhouse_logs:/var/log/clickhouse-server
        healthcheck:
            test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
            interval: 5s
            timeout: 5s
            retries: 20
            start_period: 5s

    langfuse-minio:
        image: cgr.dev/chainguard/minio
        restart: unless-stopped
        entrypoint: sh
        command:
            - -c
            - 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
        environment:
            MINIO_ROOT_USER: ${LANGFUSE_MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${LANGFUSE_MINIO_ROOT_PASSWORD}
            MC_HOST_local: http://${LANGFUSE_MINIO_ROOT_USER}:${LANGFUSE_MINIO_ROOT_PASSWORD}@localhost:9000
        # Internal-only: the browser no longer talks to Langfuse, so no
        # pre-signed media URLs need to reach this minio from the host.
        volumes:
            - langfuse_minio_data:/data
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            interval: 2s
            timeout: 5s
            retries: 10

    langfuse-redis:
        image: redis:7
        restart: unless-stopped
        command: >
            --requirepass ${LANGFUSE_REDIS_PASSWORD}
            --maxmemory-policy noeviction
        volumes:
            - langfuse_redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "-a", "${LANGFUSE_REDIS_PASSWORD}", "ping"]
            interval: 3s
            timeout: 5s
            retries: 10

volumes:
    caddy_data:
    caddy_config:
    helix_postgres_data:
    helix_minio_data:
    helix_redis_data:
    helix_snapshot_cache:
    helix_oob_cache:
    helix_venv_cache:
    langfuse_postgres_data:
    langfuse_clickhouse_data:
    langfuse_clickhouse_logs:
    langfuse_minio_data:
    langfuse_redis_data:
